# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: jingjing-note/NotionNext
  branch: main
  commit_messages:
    context: "Sveltia CMS"

media_folder: public/images
public_folder: /images

site_url: https://jingjingnote.cn

local_backend: false

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - {label: 标题, name: title, widget: string}
      - {label: 日期, name: date, widget: datetime, format: YYYY-MM-DD, date_format: YYYY-MM-DD, time_format: false}
      - {label: 分类, name: category, widget: string, required: false}
      - {label: 标签, name: tags, widget: list, required: false}
      - {label: 摘要, name: summary, widget: text, required: false}
      - {label: 封面图, name: cover, widget: image, required: false}
      - {label: 正文, name: body, widget: markdown}